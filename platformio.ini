; PlatformIO — M5Stack CoreS3 (ESP32-S3) AirPlay receiver only.
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5cores3
src_dir = main
extra_configs = user_platformio.ini

[env]
monitor_speed = 115200
monitor_filters = direct
; SPIFFS holds data/www/ (device web UI). Firmware upload alone does not write it — run
;   pio run -e m5cores3 -t buildfs
;   pio run -e m5cores3 -t uploadfs --upload-port <port>
; after the first flash (same port as upload). See README "SPIFFS".
board_build.filesystem = spiffs
build_flags =
	-Wno-maybe-uninitialized
	-Os
	-DCONFIG_SPIRAM_SIZE=8388608

[env:m5cores3]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = m5stack-cores3
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 16MB
build_flags =
	${env.build_flags}
	-DBSP_CONFIG_NO_GRAPHIC_LIB=1
board_build.cmake_extra_args =
	"-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.m5cores3"
